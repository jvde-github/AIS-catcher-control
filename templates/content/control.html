{{ define "control" }}
<div class="space-y-6">
    <!-- Custom Styles -->
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 0.5rem;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .log-line {
            font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            padding: 1px 0;
            white-space: pre;
        }

        .log-line.error {
            color: #f87171;
        }

        .log-line.warning {
            color: #fbbf24;
        }

        .log-line.info {
            color: #60a5fa;
        }

        .log-line.default {
            color: #cbd5e1;
        }
    </style>

    <!-- Update Notifications -->
    <div id="update-notifications" class="bg-white rounded-xl border-2 border-orange-400 p-4 space-y-3"
        style="display: none;">
        <!-- AIS-catcher Update -->
        <a id="ais-catcher-update-card" href="/system"
            class="hidden block bg-gradient-to-r from-amber-50 to-orange-50 hover:from-amber-100 hover:to-orange-100 rounded-lg p-3 transition-all duration-200 group">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-9 h-9 bg-orange-200 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 text-orange-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-slate-900"><span id="ais-catcher-update-title">AIS-catcher
                                Update Available</span></p>
                        <p class="text-xs text-slate-600 mt-0.5"><span id="ais-catcher-version-info"></span></p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-orange-500 group-hover:translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>
        </a>

        <!-- Control Panel Update -->
        <a id="control-update-card" href="/system"
            class="hidden block bg-gradient-to-r from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 rounded-lg p-3 transition-all duration-200 group">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-9 h-9 bg-blue-200 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-slate-900">Control Panel Update Available</p>
                        <p class="text-xs text-slate-600 mt-0.5"><span id="control-version-info"></span></p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-blue-500 group-hover:translate-x-1 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>
        </a>
    </div>

    <!-- System Daemon Card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div
            class="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <svg class="w-4 h-4 sm:w-5 sm:h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7">
                    </path>
                </svg>
                <h2 class="text-sm sm:text-base font-semibold text-slate-700">System Daemon</h2>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-limit-badge"
                    class="hidden items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-rose-100 text-rose-800 border border-rose-200">Start
                    Limit Hit</span>
                <span id="svc-uptime-badge" class="hidden text-xs text-slate-400 font-mono"></span>
                <span id="service-status-indicator"
                    class="hidden items-center px-2 py-1 rounded-full text-xs font-semibold border"></span>
            </div>
        </div>

        <!-- Process stats row (hidden when stopped) -->
        <div id="svc-process-row"
            class="px-4 sm:px-5 py-3 grid grid-cols-2 sm:grid-cols-4 gap-4 border-b border-slate-100 hidden">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Since</p>
                <p id="service-uptime" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">PID</p>
                <p id="stat-pid" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">CPU</p>
                <p id="stat-cpu" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Memory</p>
                <p id="stat-memory" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
        </div>

        <!-- Systemd health grid -->
        <div class="px-4 sm:px-5 py-4 grid grid-cols-2 sm:grid-cols-4 gap-4">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Restarts</p>
                <p id="svc-restarts" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Limit</p>
                <p id="svc-limit" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Window</p>
                <p id="svc-window" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">State</p>
                <p id="svc-substate" class="text-sm font-medium text-slate-700">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Last Result</p>
                <p id="svc-result" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Exit Code</p>
                <p id="svc-exitcode" class="text-sm font-medium text-slate-700 font-mono">—</p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Auto-Restart</p>
                <p id="svc-restartpolicy" class="text-sm font-medium text-slate-700">—</p>
                <p id="svc-restartdelay" class="text-xs text-slate-400 font-mono mt-0.5"></p>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Start at Boot</p>
                <p id="enabled-status" class="text-sm font-medium text-slate-700">—</p>
            </div>
        </div>

    </div>

    <!-- Action Card (separate, no header) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div id="action-bar" class="px-4 sm:px-5 py-3 flex items-center justify-between gap-2 transition-opacity">
            <!-- LEFT: primary contextual action -->
            <div id="action-primary">
                <div class="h-8 w-20 bg-slate-100 rounded animate-pulse"></div>
            </div>
            <!-- RIGHT: secondary actions -->
            <div id="action-secondary" class="flex items-center gap-1.5"></div>
        </div>
    </div>

    <!-- Unified Logs Section -->
    <div
        class="bg-slate-900 rounded-none sm:rounded-xl shadow-lg overflow-hidden border-x-0 sm:border-x border border-slate-700 flex flex-col">
        <div class="flex items-center justify-between px-4 py-2 bg-slate-800 border-b border-slate-700">
            <div class="flex items-center space-x-3 flex-1">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3"></path>
                </svg>
                <select id="log-source-select" onchange="switchLogSource()"
                    class="bg-slate-700 text-slate-200 text-xs px-2 py-1 rounded border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="ais-catcher">ais-catcher</option>
                    <option value="control">control panel</option>
                    <option value="system">system</option>
                </select>
                <select id="log-priority-select" onchange="switchLogSource()"
                    class="bg-slate-700 text-slate-200 text-xs px-2 py-1 rounded border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="debug">debug</option>
                    <option value="info" selected>info</option>
                    <option value="notice">notice</option>
                    <option value="warning">warning</option>
                    <option value="err">error</option>
                    <option value="crit">critical</option>
                </select>
            </div>
            <div class="flex space-x-1.5">
                <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></div>
            </div>
        </div>

        <div id="logs-container" class="h-64 sm:h-80 overflow-auto custom-scrollbar p-4 bg-slate-900">
            <div id="logs-content" class="flex flex-col justify-end min-h-full">
                <div class="text-slate-500 italic text-sm">Loading logs...</div>
            </div>
        </div>
    </div>

    <script>
        let operationInProgress = false;

        function svcSubstateHTML(sub) {
            if (!sub) return '—';
            if (sub === 'start-limit-hit') return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-rose-100 text-rose-800">start-limit-hit</span>';
            if (sub === 'running') return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800">running</span>';
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-600">${sub}</span>`;
        }

        function svcResultHTML(result) {
            if (!result) return '—';
            if (result === 'exit-code' || result === 'signal' || result === 'timeout')
                return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-rose-100 text-rose-800">${result}</span>`;
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-600">${result}</span>`;
        }

        function updateStatus() {
            Promise.all([
                fetch('/status').then(r => r.json()),
                fetch('/api/watchdog-status').then(r => r.json())
            ]).then(([svc, wd]) => {
                const running = svc.status === 'active (running)';

                // --- Header status badge ---
                const indicator = document.getElementById('service-status-indicator');
                indicator.classList.remove('hidden');
                indicator.className = 'items-center px-2 py-1 rounded-full text-xs font-semibold border inline-flex';
                if (running) {
                    indicator.classList.add('bg-emerald-100', 'text-emerald-800', 'border-emerald-200');
                    indicator.textContent = 'Running';
                } else if (svc.status === 'failed') {
                    indicator.classList.add('bg-rose-100', 'text-rose-800', 'border-rose-200');
                    indicator.textContent = 'Failed';
                } else if (svc.status === 'inactive (stopped)') {
                    indicator.classList.add('bg-slate-100', 'text-slate-600', 'border-slate-200');
                    indicator.textContent = 'Stopped';
                } else {
                    indicator.classList.add('bg-amber-100', 'text-amber-800', 'border-amber-200');
                    indicator.textContent = svc.status || 'Unknown';
                }

                // Start-limit-hit warning badge
                const limitBadge = document.getElementById('svc-limit-badge');
                if (wd.start_limit_hit) limitBadge.classList.remove('hidden');
                else limitBadge.classList.add('hidden');

                // Uptime in header
                const uptimeBadge = document.getElementById('svc-uptime-badge');
                if (running && svc.uptime) {
                    uptimeBadge.textContent = svc.uptime;
                    uptimeBadge.classList.remove('hidden');
                } else {
                    uptimeBadge.classList.add('hidden');
                }

                // --- Process stats row (only when running) ---
                const processRow = document.getElementById('svc-process-row');
                if (running) {
                    processRow.classList.remove('hidden');
                    document.getElementById('service-uptime').textContent = svc.uptime_since || '—';
                    document.getElementById('stat-pid').textContent = svc.pid || '—';
                    document.getElementById('stat-cpu').textContent = (svc.cpu != null) ? svc.cpu.toFixed(1) + '%' : '—';
                    document.getElementById('stat-memory').textContent = (svc.memory != null && svc.memory > 0) ? svc.memory.toFixed(1) + ' MB' : '—';
                } else {
                    processRow.classList.add('hidden');
                }

                // --- Systemd health grid ---
                const nr = wd.n_restarts;
                document.getElementById('svc-restarts').innerHTML = (nr != null)
                    ? (nr > 0 ? `<span class="text-amber-600">${nr}</span>` : nr)
                    : '—';
                document.getElementById('svc-limit').textContent = (wd.start_limit_burst && wd.start_limit_burst > 0) ? wd.start_limit_burst + ' restarts' : '—';
                document.getElementById('svc-window').textContent = (wd.start_limit_interval && wd.start_limit_interval !== '0') ? wd.start_limit_interval : '—';
                document.getElementById('svc-substate').innerHTML = svcSubstateHTML(wd.sub_state);
                document.getElementById('svc-result').innerHTML = svcResultHTML(wd.result);
                document.getElementById('svc-exitcode').textContent = (wd.result && wd.exit_code != null) ? wd.exit_code : '—';
                document.getElementById('svc-restartdelay').textContent = wd.restart_delay || '';

                // Auto-restart policy
                const restartEl = document.getElementById('svc-restartpolicy');
                if (restartEl) {
                    if (!wd.restart || wd.restart === 'no') restartEl.innerHTML = '<span class="text-slate-500">Disabled</span>';
                    else restartEl.innerHTML = `<span class="text-emerald-600">${wd.restart}</span>`;
                }

                // --- Auto-start label in grid ---
                const enabledEl = document.getElementById('enabled-status');
                if (svc.enabled === true) enabledEl.innerHTML = '<span class="text-emerald-600">Enabled</span>';
                else if (svc.enabled === false) enabledEl.innerHTML = '<span class="text-slate-500">Disabled</span>';
                else enabledEl.innerHTML = '<span class="text-amber-600">Unknown</span>';

                // --- Action bar: grey out while operation in progress ---
                const actionBar = document.getElementById('action-bar');
                if (operationInProgress) {
                    actionBar.classList.add('opacity-50', 'pointer-events-none');
                } else {
                    actionBar.classList.remove('opacity-50', 'pointer-events-none');
                }

                // Icon library
                const ico = {
                    stop: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1" stroke-width="2"></rect></svg>',
                    start: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l14 9-14 9V3z"/></svg>',
                    restart: '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>',
                    enable: '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>',
                    disable: '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>',
                };

                // Primary button (left): Stop when running, Start otherwise
                const primBase = 'action-button inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg border-transparent transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1';
                let primaryHTML;
                if (running) {
                    primaryHTML = `<button class="${primBase} bg-rose-600 hover:bg-rose-700 text-white focus:ring-rose-500" data-action="stop" title="Stop">${ico.stop}<span class="hidden sm:inline">Stop</span></button>`;
                } else {
                    primaryHTML = `<button class="${primBase} bg-slate-800 hover:bg-slate-700 text-white focus:ring-slate-500" data-action="start" title="Start">${ico.start}<span class="hidden sm:inline">Start</span></button>`;
                }
                document.getElementById('action-primary').innerHTML = primaryHTML;

                // Secondary buttons (right): Restart | Enable/Disable
                const secBase = 'action-button inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-medium rounded-lg border transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1';
                const ghost = `${secBase} border-slate-300 text-slate-700 bg-white hover:bg-slate-50 focus:ring-slate-400`;
                const secBtn = (action, cls, icon, label) =>
                    `<button class="${cls}" data-action="${action}" title="${label}">${icon}<span class="hidden sm:inline">${label}</span></button>`;

                let secondaryHTML = '';
                if (running) secondaryHTML += secBtn('restart', ghost, ico.restart, 'Restart');
                if (svc.enabled === false) secondaryHTML += secBtn('enable', ghost, ico.enable, 'Enable');
                if (svc.enabled === true) secondaryHTML += secBtn('disable', ghost, ico.disable, 'Disable');
                document.getElementById('action-secondary').innerHTML = secondaryHTML;
            }).catch(error => console.error('Error fetching status:', error));
        }

        document.addEventListener('DOMContentLoaded', function () {
            let eventSource = null;
            let currentLogSource = 'ais-catcher';
            let currentPriority = 'info';

            updateStatus();
            setInterval(updateStatus, 3000);

            // Check for updates on page load and every 15 minutes
            // Add 3-second delay on initial load to allow backend version check to complete
            setTimeout(checkForUpdates, 3000);
            setInterval(checkForUpdates, 15 * 60 * 1000);

            function checkForUpdates() {
                fetch('/api/update-check')
                    .then(response => response.json())
                    .then(data => {
                        const notificationsContainer = document.getElementById('update-notifications');
                        const aisCatcherCard = document.getElementById('ais-catcher-update-card');
                        const controlCard = document.getElementById('control-update-card');
                        const aisCatcherInfo = document.getElementById('ais-catcher-version-info');
                        const aisCatcherTitle = document.getElementById('ais-catcher-update-title');
                        const controlInfo = document.getElementById('control-version-info');

                        let hasUpdates = false;

                        // Show AIS-catcher card if not installed or update available
                        if (!data.ais_catcher_available) {
                            aisCatcherCard.classList.remove('hidden');
                            aisCatcherTitle.textContent = 'AIS-catcher Not Installed';
                            aisCatcherInfo.textContent = 'Click to view installation options';
                            hasUpdates = true;
                        } else if (data.ais_catcher_update_available) {
                            aisCatcherCard.classList.remove('hidden');
                            aisCatcherTitle.textContent = 'AIS-catcher Update Available';
                            // Show commit info if versions are the same
                            const currentVersion = data.ais_catcher_current || 'Current';
                            const latestVersion = data.ais_catcher_latest || 'Latest';
                            const currentCommit = data.ais_catcher_current_commit;
                            const latestCommit = data.ais_catcher_latest_commit;

                            if (currentCommit && latestCommit && currentCommit !== latestCommit) {
                                aisCatcherInfo.textContent = `${currentVersion} (${currentCommit}) → ${latestVersion} (${latestCommit})`;
                            } else {
                                aisCatcherInfo.textContent = `${currentVersion} → ${latestVersion}`;
                            }
                            hasUpdates = true;
                        } else {
                            aisCatcherCard.classList.add('hidden');
                        }

                        // Show Control panel update if available
                        if (data.control_update_available) {
                            controlCard.classList.remove('hidden');
                            controlInfo.textContent = `${data.control_current || 'Current'} → ${data.control_latest || 'Latest'}`;
                            hasUpdates = true;
                        } else {
                            controlCard.classList.add('hidden');
                        }

                        // Show/hide container based on updates
                        notificationsContainer.style.display = hasUpdates ? 'block' : 'none';
                    })
                    .catch(error => console.error('Error checking updates:', error));
            }

            // Load initial logs with priority filter
            const logsContentDiv = document.getElementById('logs-content');
            logsContentDiv.innerHTML = '<div class="text-slate-500 italic text-sm" id="loading-message">Loading logs...</div>';

            fetch(`/api/recent-logs?source=${currentLogSource}&lines=10&priority=${currentPriority}`)
                .then(response => response.json())
                .then(data => {
                    const loadingMsg = document.getElementById('loading-message');
                    if (loadingMsg) loadingMsg.remove();

                    if (data.logs && data.logs.length > 0) {
                        data.logs.forEach(log => {
                            logsContentDiv.appendChild(formatLogLine(log.message));
                        });
                        const logsContainer = document.getElementById('logs-container');
                        logsContainer.scrollTop = logsContainer.scrollHeight;
                    }
                })
                .catch(error => {
                    console.error('Error fetching initial logs:', error);
                    const loadingMsg = document.getElementById('loading-message');
                    if (loadingMsg) loadingMsg.remove();
                });

            // Switch log source
            window.switchLogSource = function () {
                const sourceSelect = document.getElementById('log-source-select');
                const prioritySelect = document.getElementById('log-priority-select');
                currentLogSource = sourceSelect.value;
                currentPriority = prioritySelect.value;
                const logsContentDiv = document.getElementById('logs-content');
                logsContentDiv.innerHTML = '<div class="text-slate-500 italic text-sm" id="loading-message">Loading logs...</div>';

                // Fetch initial logs
                fetch(`/api/recent-logs?source=${currentLogSource}&lines=10&priority=${currentPriority}`)
                    .then(response => response.json())
                    .then(data => {
                        const loadingMsg = document.getElementById('loading-message');
                        if (loadingMsg) loadingMsg.remove();

                        if (data.logs && data.logs.length > 0) {
                            data.logs.forEach(log => {
                                logsContentDiv.appendChild(formatLogLine(log.message));
                            });
                            const logsContainer = document.getElementById('logs-container');
                            logsContainer.scrollTop = logsContainer.scrollHeight;
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching initial logs:', error);
                        const loadingMsg = document.getElementById('loading-message');
                        if (loadingMsg) loadingMsg.remove();
                    });

                initializeSSE();
            };

            // Log Processing
            function formatLogLine(message) {
                const div = document.createElement('div');
                div.classList.add('log-line');

                if (message.includes('[ERROR]') || message.toLowerCase().includes('error:')) {
                    div.classList.add('error');
                    div.textContent = message.replace('[ERROR]', '').trim();
                } else if (message.includes('[WARNING]') || message.toLowerCase().includes('warn:')) {
                    div.classList.add('warning');
                    div.textContent = message.replace('[WARNING]', '').trim();
                } else if (message.includes('[INFO]')) {
                    div.classList.add('info');
                    div.textContent = message.replace('[INFO]', '').trim();
                } else {
                    div.classList.add('default');
                    div.textContent = message;
                }
                return div;
            }

            document.querySelectorAll('#logs-content .log-line').forEach(line => {
                const text = line.textContent;
                line.className = 'log-line';
                if (text.includes('[ERROR]')) line.classList.add('error');
                else if (text.includes('[WARNING]')) line.classList.add('warning');
                else if (text.includes('[INFO]')) line.classList.add('info');
                else line.classList.add('default');
                if (text.includes(']')) line.textContent = text.substring(text.indexOf(']') + 1).trim();
            });

            function initializeSSE() {
                if (eventSource) eventSource.close();
                const logsContentDiv = document.getElementById('logs-content');
                const logsContainer = document.getElementById('logs-container');

                const streamUrl = '/logs-stream?source=' + currentLogSource + '&priority=' + currentPriority;
                eventSource = new EventSource(streamUrl);

                eventSource.onmessage = function (event) {
                    try {
                        // Remove loading message if it still exists
                        const loadingMsg = document.getElementById('loading-message');
                        if (loadingMsg) loadingMsg.remove();

                        const logMsg = JSON.parse(event.data);
                        const newLog = formatLogLine(logMsg.message);
                        logsContentDiv.appendChild(newLog);

                        // Limit the number of log lines to prevent memory issues
                        const maxLogs = 1000;
                        while (logsContentDiv.children.length > maxLogs) {
                            logsContentDiv.removeChild(logsContentDiv.firstChild);
                        }

                        const isAtBottom = logsContainer.scrollHeight - logsContainer.scrollTop <= logsContainer.clientHeight + 100;
                        if (isAtBottom) logsContainer.scrollTop = logsContainer.scrollHeight;
                    } catch (e) {
                        console.error('Error processing log:', e);
                    }
                };

                eventSource.onerror = () => {
                    eventSource.close();
                    setTimeout(initializeSSE, 5000);
                };
            }

            initializeSSE();

            const handleAction = (e) => {
                const button = e.target.closest('.action-button');
                if (!button || operationInProgress) return;

                e.preventDefault();
                const action = button.getAttribute('data-action');

                // Grey out entire action bar immediately
                operationInProgress = true;
                const actionBar = document.getElementById('action-bar');
                actionBar.classList.add('opacity-50', 'pointer-events-none');

                fetch(`/api/${action}`, { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status) {
                            // For enable/disable and restart, add delay for systemd state to update
                            if (action === 'restart' || action === 'enable' || action === 'disable') {
                                setTimeout(() => {
                                    operationInProgress = false;
                                    updateStatus();
                                }, action === 'restart' ? 3000 : 1000);
                            } else {
                                // Reset operation flag before updateStatus so buttons get enabled
                                operationInProgress = false;
                                updateStatus();
                            }
                        } else {
                            alert('Action failed: ' + (data.message || 'Unknown error'));
                            operationInProgress = false;
                            updateStatus();
                        }
                    })
                    .catch(err => {
                        console.error('Error:', err);
                        alert('Error: ' + err);
                        operationInProgress = false;
                        updateStatus();
                    });
            };

            document.getElementById('action-bar').addEventListener('click', handleAction);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) { if (eventSource) eventSource.close(); }
                else { initializeSSE(); updateStatus(); }
            });

            const logsContainer = document.getElementById('logs-container');
            if (logsContainer) logsContainer.scrollTop = logsContainer.scrollHeight;
        });
    </script>
</div>
{{ end }}
