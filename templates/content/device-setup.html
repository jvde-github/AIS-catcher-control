{{ define "device-setup" }}
<div id="device-setup" class="max-w-2xl mx-auto px-0 md:px-4 lg:px-6 py-0 md:py-4 lg:py-6 md:bg-white md:rounded-lg md:shadow-md">
    <h3 class="hidden md:block text-lg text-xl font-semibold text-gray-800 mb-4">Device Configuration</h3>

    <div id="receivers-container" class="space-y-6">
        <!-- Receivers will be dynamically populated here -->
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        createChannelManager({
            channelType: 'receiver',
            schema: receiverSchema,
            containerId: 'receivers-container',
            title: 'Receiver'
        });
    });
</script>
{{ end }}
