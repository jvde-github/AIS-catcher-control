<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AIS-catcher Hub</title>
    <link rel="stylesheet" href="/static/css/tailwind.css?v={{.CssVersion}}">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
            touch-action: pan-x pan-y;
            overscroll-behavior: none;
            position: fixed;
            width: 100%;
        }
        
        #hub-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }
        
        #webviewer-frame {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            width: 100%;
            height: 100%;
            touch-action: pan-x pan-y;
        }
        
        #bottom-bar {
            position: relative;
            flex-shrink: 0;
            width: 100%;
            background: #0f172a;
            border-top: 1px solid #334155;
            z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .hub-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0.75rem;
            color: white;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            min-width: 70px;
        }
        
        .hub-button:hover {
            background: #1e293b;
        }
        
        .hub-button.active {
            background: #1e293b;
        }
        
        .hub-button svg {
            width: 1.5rem;
            height: 1.5rem;
            margin-bottom: 0.25rem;
        }

        #config-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            height: 100dvh;
            background: white;
            box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
            transition: right 0.3s ease;
            z-index: 60;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        #config-content {
            flex: 1;
            overflow-y: auto;
        }

        #config-panel.open {
            right: 0;
        }

        #config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 55;
        }

        #config-overlay.open {
            display: block;
        }

        @media (max-width: 640px) {
            #config-panel {
                max-width: 100%;
            }
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #login-overlay.open {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="hub-container">
        <div id="loading" class="text-center p-8 absolute inset-0 flex items-center justify-center">
            <div>
                <svg class="animate-spin h-12 w-12 text-slate-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-slate-600">Checking webviewer status...</p>
            </div>
        </div>
        <iframe id="webviewer-frame" src="" class="hidden" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        
        <div id="config-overlay" onclick="closeConfigPanel()"></div>

        <!-- Login Modal -->
        <div id="login-overlay">
            <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
                <h3 class="text-lg font-semibold text-slate-800 mb-1">Sign In</h3>
                <p class="text-sm text-slate-500 mb-4">Authentication required to continue.</p>
                <div id="login-error" class="hidden mb-3 text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2"></div>
                <form id="login-form" onsubmit="submitLogin(event)" class="space-y-3">
                    <input id="login-username" name="username" type="text" autocomplete="username"
                        placeholder="Username"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
                    <input id="login-password" name="password" type="password" autocomplete="current-password"
                        placeholder="Password"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
                    <div class="flex gap-2 pt-1">
                        <button type="button" onclick="closeLoginModal()"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-medium border border-slate-300 text-slate-600 hover:bg-slate-50 transition">
                            Cancel
                        </button>
                        <button type="submit" id="login-submit"
                            class="flex-1 px-4 py-2 rounded-lg text-sm font-semibold bg-slate-800 text-white hover:bg-slate-700 transition">
                            Sign In
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Config Panel -->
        <div id="config-panel">
            <div class="flex items-center justify-between p-4 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white">
                <h3 id="config-title" class="text-lg font-semibold text-slate-800">Configuration</h3>
                <button onclick="closeConfigPanel()" class="text-slate-600 hover:text-slate-800 p-1">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="status-message" class="hidden"></div>
            <div id="config-content" class="p-4">
                <!-- Dynamic content will be loaded here -->
            </div>
        </div>
        
    </div>
    
    <nav id="bottom-bar">
        <!-- Status indicator + viewer picker (bottom-left) -->
        <div id="status-dot-wrap" class="absolute left-3 bottom-0 h-16 flex flex-col items-start justify-center gap-1" style="z-index:51">
            <div class="relative group">
                <span id="status-dot" class="block w-2.5 h-2.5 rounded-full bg-slate-500 cursor-default"></span>
                <div class="absolute bottom-full left-0 mb-2 min-w-max px-2.5 py-1.5 rounded-lg bg-slate-800 text-white text-xs shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-150 whitespace-nowrap">
                    <div id="status-dot-label" class="font-medium">Checking&#8230;</div>
                    <div id="status-dot-uptime" class="text-slate-400 text-xs mt-0.5"></div>
                    <div class="absolute top-full left-3 border-4 border-transparent border-t-slate-800"></div>
                </div>
            </div>
            <select id="viewer-select" class="hidden text-[10px] bg-transparent text-slate-400 border-0 outline-none cursor-pointer leading-none p-0 max-w-[3.5rem]" title="Switch webviewer" onchange="switchViewer(this.value)"></select>
        </div>
        <div id="nav-buttons" class="flex items-center justify-center h-16 gap-6 sm:gap-12 pl-16 pr-4 transition-opacity">
            <button id="nav-start-restart" class="hub-button" data-view="control" onclick="onStartRestartClick()">
                <svg id="nav-sr-icon" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z" />
                </svg>
                <span id="nav-sr-label">Start</span>
            </button>
            <button id="nav-btn-input" class="hub-button" data-view="input" onclick="openConfig('input')">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M160-80q-33 0-56.5-23.5T80-160v-480q0-25 13.5-45t36.5-29l506-206 26 66-330 134h468q33 0 56.5 23.5T880-640v480q0 33-23.5 56.5T800-80H160Zm0-80h640v-280H160v280Zm160-40q42 0 71-29t29-71q0-42-29-71t-71-29q-42 0-71 29t-29 71q0 42 29 71t71 29ZM160-520h480v-80h80v80h80v-120H160v120Zm0 360v-280 280Z" />
                </svg>
                <span>Input</span>
            </button>
            <button id="nav-btn-output" class="hub-button" data-view="output" onclick="openConfig('output')">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M680-80q-50 0-85-35t-35-85q0-6 3-28L282-392q-16 15-37 23.5t-45 8.5q-50 0-85-35t-35-85q0-50 35-85t85-35q24 0 45 8.5t37 23.5l281-164q-2-7-2.5-13.5T560-760q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-24 0-45-8.5T598-672L317-508q2-7 2.5-13.5t.5-14.5q0-8-.5-14.5T317-452l281 164q16-15 37-23.5t45-8.5q50 0 85 35t35 85q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T720-200q0-17-11.5-28.5T680-240q-17 0-28.5 11.5T640-200q0 17 11.5 28.5T680-160ZM200-440q17 0 28.5-11.5T240-480q0-17-11.5-28.5T200-520q-17 0-28.5 11.5T160-480q0 17 11.5 28.5T200-440Zm480-280q17 0 28.5-11.5T720-760q0-17-11.5-28.5T680-800q-17 0-28.5 11.5T640-760q0 17 11.5 28.5T680-720Zm0 520ZM200-480Zm480-280Z" />
                </svg>
                <span>Output</span>
            </button>
            <button id="nav-btn-control" class="hub-button" data-view="webviewer" onclick="window.location.href='/control'">
                <svg viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm80-80h400v-400H280v400Z"/>
                </svg>
                <span>Control</span>
            </button>
        </div>
    </nav>
    
    <script src="/static/js/schema.js?v={{.CssVersion}}"></script>
    <script src="/static/js/config-manager.js?v={{.CssVersion}}"></script>

    <script>
        // Prevent double-tap zoom on mobile
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Disable pinch-to-zoom on iOS
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
            document.body.style.transform = 'scale(1)';
        }, { passive: false });

        document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('gestureend', function(e) {
            e.preventDefault();
        }, { passive: false });

        const allServers = {{.ServersJSON}};
        let hasServer = {{.HasServer}};
        let port = "{{.port}}";
        let webviewerActive = {{.WebviewerActive}};
        let isLoggedIn = {{.IsLoggedIn}};
        let pendingAction = null;
        let serviceRunning = false;
        let currentLoadTimeout = null;
        let statusPollInterval = null;
        const requestedPort = "{{.RequestedPort}}";

        function setAuthButtons(loggedIn) {
            ['nav-btn-input', 'nav-btn-output', 'nav-btn-control'].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                if (loggedIn) {
                    btn.classList.remove('opacity-40', 'pointer-events-none');
                    btn.removeAttribute('title');
                } else {
                    btn.classList.add('opacity-40', 'pointer-events-none');
                    btn.title = 'Login required';
                }
            });
        }

        // Apply auth-dependent UI state immediately
        if (!isLoggedIn) {
            setAuthButtons(false);
            // Hide status dot — no point showing unknown state
            const dotWrap = document.getElementById('status-dot-wrap');
            if (dotWrap) dotWrap.style.display = 'none';
            // Replace Start/Restart button with Login
            const srBtn = document.getElementById('nav-start-restart');
            if (srBtn) {
                srBtn.onclick = () => { pendingAction = null; document.getElementById('login-overlay').classList.add('open'); setTimeout(() => document.getElementById('login-username').focus(), 50); };
                document.getElementById('nav-sr-icon').innerHTML = '<path d="M480-120v-80h280v-560H480v-80h280q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H480Zm-80-160-55-58 102-102H120v-80h327L345-622l55-58 200 200-200 200Z"/>';
                document.getElementById('nav-sr-label').textContent = 'Login';
            }
        }

        function setNavBusy(busy) {
            const nav = document.getElementById('nav-buttons');
            const dot = document.getElementById('status-dot');
            const dotLabel = document.getElementById('status-dot-label');
            if (busy) {
                nav.classList.add('opacity-50', 'pointer-events-none');
                if (dot) dot.className = 'block w-2.5 h-2.5 rounded-full bg-amber-400 cursor-default';
                if (dotLabel) dotLabel.textContent = 'Working...';
            } else {
                nav.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function updateStartRestartButton(running) {
            serviceRunning = running;
            // Update nav start/restart button
            const btn = document.getElementById('nav-start-restart');
            const label = document.getElementById('nav-sr-label');
            const icon = document.getElementById('nav-sr-icon');
            if (running) {
                label.textContent = 'Restart';
                icon.innerHTML = '<path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/>';
            } else {
                label.textContent = 'Start';
                icon.innerHTML = '<path d="M320-200v-560l440 280-440 280Zm80-280Zm0 134 210-134-210-134v268Z"/>';
            }
            // Update status dot
            const dot = document.getElementById('status-dot');
            const dotLabel = document.getElementById('status-dot-label');
            if (dot && dotLabel) {
                if (running) {
                    dot.className = 'block w-2.5 h-2.5 rounded-full bg-emerald-500 cursor-default';
                    dotLabel.textContent = 'Running';
                } else {
                    dot.className = 'block w-2.5 h-2.5 rounded-full bg-slate-500 cursor-default';
                    dotLabel.textContent = 'Stopped';
                }
            }
        }

        function switchViewer(selectedPort) {
            clearTimeout(currentLoadTimeout);
            const srv = allServers.find(s => String(s.port) === String(selectedPort));
            if (!srv) return;
            // Close config panel if open
            closeConfigPanel();
            const hubContainer = document.getElementById('hub-container');
            // Remove dynamically inserted overlays (errors, picker) but not static elements
            Array.from(hubContainer.children).forEach(el => {
                if (el.id !== 'loading' && el.id !== 'webviewer-frame' && el.id !== 'config-overlay' && el.id !== 'config-panel' && el.id !== 'login-overlay') el.remove();
            });
            const iframe = document.getElementById('webviewer-frame');
            iframe.classList.add('hidden');
            iframe.src = '';
            document.getElementById('loading').classList.remove('hidden');
            proceedWithServer(srv.port, srv.active);
        }

        function initViewerSelect() {
            if (allServers.length <= 1) return;
            const sel = document.getElementById('viewer-select');
            if (!sel) return;
            sel.innerHTML = '';
            allServers.forEach(srv => {
                const opt = document.createElement('option');
                opt.value = srv.port;
                opt.textContent = ':' + srv.port;
                if (String(srv.port) === String(port)) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.classList.remove('hidden');
        }

        function pollUntilRunning(onReady, maxWaitMs = 30000) {
            const interval = 2000;
            let elapsed = 0;
            const timer = setInterval(() => {
                elapsed += interval;
                fetch('/status')
                    .then(r => r.json())
                    .then(d => {
                        if (d.running) {
                            clearInterval(timer);
                            onReady();
                        } else if (elapsed >= maxWaitMs) {
                            clearInterval(timer);
                            setNavBusy(false);
                        }
                    })
                    .catch(() => {
                        if (elapsed >= maxWaitMs) { clearInterval(timer); setNavBusy(false); }
                    });
            }, interval);
        }

        function onStartRestartClick() {
            const action = serviceRunning ? 'restart' : 'start';
            requireAuth(() => {
                setNavBusy(true);
                fetch('/api/' + action, { method: 'POST', credentials: 'include' })
                    .then(() => pollUntilRunning(() => window.location.reload()))
                    .catch(() => setNavBusy(false));
            });
        }

        function requireAuth(callback) {
            if (isLoggedIn) {
                callback();
                return;
            }
            pendingAction = callback;
            const overlay = document.getElementById('login-overlay');
            overlay.classList.add('open');
            setTimeout(() => document.getElementById('login-username').focus(), 50);
        }

        function closeLoginModal() {
            document.getElementById('login-overlay').classList.remove('open');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-form').reset();
            pendingAction = null;
        }

        function submitLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = document.getElementById('login-submit');
            const errorEl = document.getElementById('login-error');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            errorEl.classList.add('hidden');

            const body = new URLSearchParams({ username, password });
            fetch('/login', {
                method: 'POST',
                credentials: 'include',
                redirect: 'follow',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            })
            .then(res => {
                // On success, server redirects to /control or /change-password
                // On failure, server returns 200 with the login page
                const url = res.url || '';
                if (url.includes('/login')) {
                    // Still on login page = wrong credentials
                    errorEl.textContent = 'Invalid credentials';
                    errorEl.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                } else {
                    // Logged in successfully
                    isLoggedIn = true;
                    setAuthButtons(true);
                    // Restore status dot and Start/Restart button
                    const dotWrap = document.getElementById('status-dot-wrap');
                    if (dotWrap) dotWrap.style.display = '';
                    const srBtn = document.getElementById('nav-start-restart');
                    if (srBtn) srBtn.onclick = onStartRestartClick;
                    // Fetch status to set correct button label
                    fetch('/status').then(r => r.json()).then(d => updateStartRestartButton(!!d.running)).catch(() => {});
                    closeLoginModal();
                    if (pendingAction) {
                        const action = pendingAction;
                        pendingAction = null;
                        action();
                    }
                }
            })
            .catch(() => {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            });
        }
        const iframe = document.getElementById('webviewer-frame');
        const loadingDiv = document.getElementById('loading');
        const configPanel = document.getElementById('config-panel');
        const configOverlay = document.getElementById('config-overlay');
        const configContent = document.getElementById('config-content');
        const configTitle = document.getElementById('config-title');
        let currentView = 'main';
        let configData = {};

        function showError(title, message, showRestart = false) {
            const hubContainer = document.getElementById('hub-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'flex items-center justify-center h-full bg-slate-50 absolute inset-0 z-10';
            errorDiv.innerHTML = `
                <div class="max-w-md p-8 text-center">
                    <svg class="h-16 w-16 text-amber-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-slate-800 mb-2">${title}</h3>
                    <p class="text-slate-600 mb-4">${message}</p>
                    <div class="flex flex-col items-center gap-3">
                        ${showRestart ? `<button id="error-restart-btn" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-6 py-2 rounded-lg transition font-medium">Restart Service</button>` : ''}
                        <a href="/server" class="text-sm text-slate-500 hover:text-slate-700 underline">Configure Webviewer</a>
                    </div>
                </div>
            `;
            loadingDiv.classList.add('hidden');
            hubContainer.insertBefore(errorDiv, hubContainer.firstChild);
            if (showRestart) {
                document.getElementById('error-restart-btn').addEventListener('click', function() {
                    const btn = this;
                    requireAuth(() => {
                        btn.textContent = 'Restarting...';
                        btn.disabled = true;
                        fetch('/api/restart', { method: 'POST', credentials: 'include' })
                            .then(() => pollUntilRunning(() => window.location.reload()))
                            .catch(() => { btn.disabled = false; btn.textContent = 'Restart Service'; });
                    });
                });
            }
        }

        function startStatusPolling() {
            if (statusPollInterval) return;
            statusPollInterval = setInterval(() => {
                fetch('/status', { credentials: 'include' })
                    .then(r => r.json())
                    .then(data => updateStartRestartButton(!!data.running))
                    .catch(() => {});
            }, 12000);
        }

        function checkServiceStatus() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            fetch('/status', { signal: controller.signal })
                .then(response => {
                    clearTimeout(timeoutId);
                    return response.json();
                })
                .then(data => {
                    updateStartRestartButton(!!data.running);
                    if (!data.running) {
                        const hubContainer = document.getElementById('hub-container');
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'flex items-center justify-center h-full bg-slate-50 absolute inset-0 z-10';
                        errorDiv.innerHTML = `
                            <div class="max-w-md p-8 text-center">
                                <svg class="h-16 w-16 text-amber-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                </svg>
                                <h3 class="text-xl font-semibold text-slate-800 mb-2">AIS-catcher Not Running</h3>
                                <p class="text-slate-600 mb-4">The AIS-catcher service is not currently running.</p>
                                <div class="flex flex-col items-center gap-3">
                                    <button id="notrunning-start-btn" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg transition font-medium">Start Service</button>
                                    <a href="/control" class="text-sm text-slate-500 hover:text-slate-700 underline">Go to Control</a>
                                </div>
                            </div>
                        `;
                        loadingDiv.classList.add('hidden');
                        hubContainer.insertBefore(errorDiv, hubContainer.firstChild);
                        document.getElementById('notrunning-start-btn').addEventListener('click', function() {
                            const btn = this;
                            requireAuth(() => {
                                btn.textContent = 'Starting...';
                                btn.disabled = true;
                                fetch('/api/start', { method: 'POST', credentials: 'include' })
                                    .then(() => pollUntilRunning(() => window.location.reload()))
                                    .catch(() => { btn.disabled = false; btn.textContent = 'Start Service'; });
                            });
                        });
                        return;
                    }
                    // Service is running — load the webviewer iframe
                    loadWebviewer();
                    startStatusPolling();
                })
                .catch(() => {
                    clearTimeout(timeoutId);
                    loadWebviewer();
                    startStatusPolling();
                });
        }

        function showWebviewerDisabled() {
            const hubContainer = document.getElementById('hub-container');
            const errorDiv = document.createElement('div');
            errorDiv.id = 'webviewer-disabled-msg';
            errorDiv.className = 'flex items-center justify-center h-full bg-slate-50 absolute inset-0 z-10';
            errorDiv.innerHTML = `
                <div class="max-w-md p-8 text-center">
                    <svg class="h-16 w-16 text-slate-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <h3 class="text-xl font-semibold text-slate-800 mb-2">Webviewer Output Disabled</h3>
                    <p class="text-slate-600 mb-1">The webviewer output is configured on port <strong>${port}</strong> but is currently <strong>inactive</strong>.</p>
                    <p class="text-slate-500 text-sm mb-6">Enable it in the output settings and restart the service.</p>
                    <div class="flex flex-col gap-3">
                        <button id="enable-webviewer-btn" onclick="enableAndRestart()" class="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg transition font-medium">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            Enable &amp; Restart
                        </button>
                        <a href="/server" class="inline-block text-slate-600 hover:text-slate-800 text-sm underline">Edit webviewer settings</a>
                    </div>
                </div>
            `;
            loadingDiv.classList.add('hidden');
            hubContainer.insertBefore(errorDiv, hubContainer.firstChild);
        }

        function enableAndRestart() {
            requireAuth(_doEnableAndRestart);
        }

        function _doEnableAndRestart() {
            const btn = document.getElementById('enable-webviewer-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

            fetch('/api/webviewer/toggle', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ port: String(port), active: true })
            })
            .then(r => {
                if (!r.ok) throw new Error('Save failed');
                if (btn) btn.textContent = 'Restarting...';
                return fetch('/api/restart', { method: 'POST', credentials: 'include' });
            })
            .then(() => {
                pollUntilRunning(() => window.location.reload());
            })
            .catch(err => {
                console.error('Enable failed:', err);
                if (btn) { btn.disabled = false; btn.textContent = 'Enable & Restart'; }
                alert('Failed to enable webviewer: ' + err.message);
            });
        }

        function openWebviewerInNewTab() {
            if (hasServer && port) {
                try {
                    var url = new URL(window.location.href);
                    url.port = port;
                    url.pathname = '/';
                    url.search = '';
                    url.hash = '';
                    window.open(url.toString(), '_blank');
                } catch (e) {
                    console.error('Error opening webviewer:', e);
                }
            }
        }

        function loadWebviewer() {
            try {
                var url = new URL(window.location.href);
                url.port = port;
                url.pathname = '/';
                url.search = '';
                url.hash = '';
                var newUrl = url.toString();

                iframe.src = newUrl;
                
                currentLoadTimeout = setTimeout(() => {
                    showError(
                        'Webviewer Not Responding',
                        'Port ' + port + ' is not responding. If this server was recently added, a service restart is required to activate it.',
                        true
                    );
                }, 8000);

                iframe.onload = function() {
                    clearTimeout(currentLoadTimeout);
                    loadingDiv.classList.add('hidden');
                    iframe.classList.remove('hidden');
                };

                iframe.onerror = function() {
                    clearTimeout(currentLoadTimeout);
                    showError(
                        'Webviewer Load Error',
                        'Failed to load the webviewer on port ' + port + '. Please check the service status on the Control page.'
                    );
                };
            } catch (e) {
                console.error('Invalid URL:', e);
                showError('Configuration Error', 'There was an error processing the webviewer URL.');
            }
        }

        function openConfig(type) {
            requireAuth(() => _openConfig(type));
        }

        function _openConfig(type) {
            if (typeof App !== 'undefined' && App.setUnsaved) {
                App.setUnsaved(false);
            }
            const statusEl = document.getElementById('status-message');
            if (statusEl) {
                statusEl.className = 'hidden';
                statusEl.innerHTML = '';
            }
            
            currentView = type;
            
            // Update button states
            document.querySelectorAll('.hub-button').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === type) {
                    btn.classList.add('active');
                }
            });

            // Set title
            const titles = {
                input: 'Input Configuration',
                output: 'Output Configuration',
                control: 'Service Control'
            };
            configTitle.textContent = titles[type] || 'Configuration';

            // Load content based on type
            if (type === 'input') {
                loadSourceConfig();
            } else if (type === 'output') {
                loadOutputConfig();
            } else if (type === 'control') {
                loadControlConfig();
            }

            // Show panel
            configPanel.classList.add('open');
            configOverlay.classList.add('open');
        }

        function closeConfigPanel() {
            // Check for unsaved changes before closing
            if (typeof App !== 'undefined' && App.state && App.state.unsaved) {
                if (!confirm('You have unsaved changes. Are you sure you want to close without saving?')) {
                    return;
                }
            }
            
            // Clear unsaved state when closing
            if (typeof App !== 'undefined' && App.setUnsaved) {
                App.setUnsaved(false);
            }
            
            // Clear the status message HTML
            const statusEl = document.getElementById('status-message');
            if (statusEl) {
                statusEl.className = 'hidden';
                statusEl.innerHTML = '';
            }
            
            // Reset output type to default
            currentOutputType = 'sharing';
            
            configPanel.classList.remove('open');
            configOverlay.classList.remove('open');
            
            // Reset to webviewer view
            if (currentView !== 'webviewer') {
                currentView = 'webviewer';
                document.querySelectorAll('.hub-button').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.view === 'webviewer') {
                        btn.classList.add('active');
                    }
                });
            }
        }

        function loadSourceConfig() {
            configContent.innerHTML = '<div class="text-center p-8"><div class="animate-spin h-8 w-8 border-4 border-slate-300 border-t-slate-600 rounded-full mx-auto mb-2"></div><p class="text-sm text-slate-600">Loading...</p></div>';
            
            fetch('/api/config', { credentials: 'include' })
                .then(res => {
                    if (!res.ok) throw new Error('Failed to fetch configuration');
                    return res.json();
                })
                .then(data => {
                    configData = data;
                    renderSourceConfig(data);
                })
                .catch(err => {
                    console.error('Config load error:', err);
                    configContent.textContent = '';
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'text-center p-8';
                    const p = document.createElement('p');
                    p.className = 'text-slate-600';
                    p.textContent = 'Failed to load configuration';
                    const button = document.createElement('button');
                    button.onclick = loadSourceConfig;
                    button.className = 'mt-4 px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700';
                    button.textContent = 'Retry';
                    errorDiv.appendChild(p);
                    errorDiv.appendChild(button);
                    configContent.appendChild(errorDiv);
                });
        }

        function renderSourceConfig(data) {
            configContent.textContent = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'space-y-4';
            const container = document.createElement('div');
            container.id = 'hub-receivers-container';
            container.className = 'space-y-4';
            wrapper.appendChild(container);
            configContent.appendChild(wrapper);

            createChannelManager({
                channelType: 'receiver',
                schema: receiverSchema,
                containerId: 'hub-receivers-container',
                title: 'Receiver'
            });
        }

        function loadOutputConfig() {
            configContent.innerHTML = '<div class="text-center p-8"><div class="animate-spin h-8 w-8 border-4 border-slate-300 border-t-slate-600 rounded-full mx-auto mb-2"></div><p class="text-sm text-slate-600">Loading...</p></div>';
            
            fetch('/api/config', { credentials: 'include' })
                .then(res => {
                    if (!res.ok) throw new Error('Failed to fetch configuration');
                    return res.json();
                })
                .then(data => {
                    configData = data;
                    renderOutputConfig(data);
                })
                .catch(err => {
                    console.error('Config load error:', err);
                    configContent.textContent = '';
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'text-center p-8';
                    const p = document.createElement('p');
                    p.className = 'text-slate-600';
                    p.textContent = 'Failed to load configuration';
                    const button = document.createElement('button');
                    button.onclick = loadOutputConfig;
                    button.className = 'mt-4 px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700';
                    button.textContent = 'Retry';
                    errorDiv.appendChild(p);
                    errorDiv.appendChild(button);
                    configContent.appendChild(errorDiv);
                });
        }

        let currentOutputManager = null;
        let currentOutputType = 'sharing';

        const outputTypes = [
            { value: 'sharing', label: 'Community' },
            { value: 'udp',     label: 'UDP' },
            { value: 'http',    label: 'HTTP' },
            { value: 'mqtt',    label: 'MQTT' },
            { value: 'tcp',     label: 'TCP Client' },
            { value: 'tcp-server', label: 'TCP Server' },
            { value: 'server',  label: 'Viewer' },
        ];

        function renderOutputConfig(data) {
            currentOutputType = 'sharing';
            configContent.textContent = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'space-y-4';

            // Pill-style tab bar
            const tabBar = document.createElement('div');
            tabBar.className = 'flex flex-wrap gap-1.5 p-1.5 bg-slate-100 rounded-xl mb-2';

            outputTypes.forEach(({ value, label }) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.outputType = value;
                btn.textContent = label;
                btn.className = value === currentOutputType
                    ? 'flex-1 px-2 py-1.5 rounded-lg text-xs font-semibold bg-white text-slate-800 shadow-sm transition-all'
                    : 'flex-1 px-2 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-700 transition-all';
                btn.addEventListener('click', () => {
                    currentOutputType = value;
                    tabBar.querySelectorAll('button').forEach(b => {
                        const active = b.dataset.outputType === value;
                        b.className = active
                            ? 'flex-1 px-2 py-1.5 rounded-lg text-xs font-semibold bg-white text-slate-800 shadow-sm transition-all'
                            : 'flex-1 px-2 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-700 transition-all';
                    });
                    updateOutputView();
                });
                tabBar.appendChild(btn);
            });

            const container = document.createElement('div');
            container.id = 'hub-output-container';
            wrapper.appendChild(tabBar);
            wrapper.appendChild(container);
            configContent.appendChild(wrapper);

            updateOutputView();
        }

        function updateOutputView() {
            const type = currentOutputType;
            
            const schemaMap = {
                sharing: typeof sharingSchema !== 'undefined' ? sharingSchema : {},
                udp: typeof udpSchema !== 'undefined' ? udpSchema : {},
                http: typeof httpSchema !== 'undefined' ? httpSchema : {},
                mqtt: typeof mqttSchema !== 'undefined' ? mqttSchema : {},
                tcp: typeof tcpSchema !== 'undefined' ? tcpSchema : {},
                'tcp-server': typeof tcpServerSchema !== 'undefined' ? tcpServerSchema : {},
                server: typeof webviewerSchema !== 'undefined' ? webviewerSchema : {}
            };

            const schema = schemaMap[type];
            
            if (currentOutputManager) {
                currentOutputManager = null;
            }

            // Sharing uses createSimpleConfigManager, others use createChannelManager
            if (type === 'sharing' && typeof createSimpleConfigManager !== 'undefined') {
                currentOutputManager = createSimpleConfigManager({
                    schema: schema,
                    containerId: 'hub-output-container'
                });
            } else if (typeof createChannelManager !== 'undefined') {
                // Map display type to actual config field name
                const channelTypeMap = {
                    'tcp-server': 'tcp_listener',
                    'tcp': 'tcp',
                    'udp': 'udp',
                    'http': 'http',
                    'mqtt': 'mqtt',
                    'server': 'server'
                };
                const actualChannelType = channelTypeMap[type] || type;
                
                currentOutputManager = createChannelManager({
                    channelType: actualChannelType,
                    schema: schema,
                    containerId: 'hub-output-container',
                    title: type.charAt(0).toUpperCase() + type.slice(1)
                });
            }
        }

        function loadControlConfig() {
            configContent.textContent = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'space-y-6';
            
            const statusBox = document.createElement('div');
            statusBox.className = 'bg-slate-50 rounded-lg p-4 border border-slate-200';
            const statusHeader = document.createElement('div');
            statusHeader.className = 'flex items-center justify-between mb-4';
            const statusLeft = document.createElement('div');
            statusLeft.className = 'flex items-center space-x-3';
            const statusTitle = document.createElement('span');
            statusTitle.className = 'font-semibold text-slate-800';
            statusTitle.textContent = 'Service Status';
            statusLeft.appendChild(statusTitle);
            const statusRight = document.createElement('div');
            statusRight.id = 'hub-status';
            statusRight.className = 'flex items-center space-x-2';
            const statusText = document.createElement('span');
            statusText.className = 'text-sm font-medium text-slate-600';
            statusText.textContent = 'Checking...';
            statusRight.appendChild(statusText);
            statusHeader.appendChild(statusLeft);
            statusHeader.appendChild(statusRight);
            const uptime = document.createElement('div');
            uptime.id = 'hub-uptime';
            uptime.className = 'text-sm text-slate-600 mb-4';
            uptime.textContent = 'Uptime: --:--:--';
            statusBox.appendChild(statusHeader);
            statusBox.appendChild(uptime);
            
            const buttons = document.createElement('div');
            buttons.className = 'space-y-3';
            const startBtn = document.createElement('button');
            startBtn.onclick = () => controlService('start');
            startBtn.className = 'w-full bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded-lg transition flex items-center justify-center gap-2 font-medium';
            startBtn.textContent = 'Start Service';
            const stopBtn = document.createElement('button');
            stopBtn.onclick = () => controlService('stop');
            stopBtn.className = 'w-full bg-rose-600 hover:bg-rose-700 text-white px-4 py-3 rounded-lg transition flex items-center justify-center gap-2 font-medium';
            stopBtn.textContent = 'Stop Service';
            const restartBtn = document.createElement('button');
            restartBtn.onclick = () => controlService('restart');
            restartBtn.className = 'w-full bg-slate-600 hover:bg-slate-700 text-white px-4 py-3 rounded-lg transition flex items-center justify-center gap-2 font-medium';
            restartBtn.textContent = 'Restart Service';
            buttons.appendChild(startBtn);
            buttons.appendChild(stopBtn);
            buttons.appendChild(restartBtn);
            
            wrapper.appendChild(statusBox);
            wrapper.appendChild(buttons);
            configContent.appendChild(wrapper);

            updateControlStatus();
        }

        function updateControlStatus() {
            fetch('/status')
                .then(res => res.json())
                .then(data => {
                    updateStartRestartButton(!!data.running);
                    const statusEl = document.getElementById('hub-status');
                    const uptimeEl = document.getElementById('hub-uptime');
                    
                    if (statusEl) {
                        const isRunning = data.running;
                        statusEl.innerHTML = isRunning 
                            ? '<span class="text-sm font-medium text-emerald-600">Running</span><span class="relative flex h-2.5 w-2.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span></span>'
                            : '<span class="text-sm font-medium text-slate-600">Stopped</span><span class="relative flex h-2.5 w-2.5"><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-400"></span></span>';
                    }
                    
                    if (uptimeEl) {
                        uptimeEl.textContent = 'Uptime: ' + (data.uptime || 'N/A');
                    }

                    // Update status dot uptime
                    const dotUptime = document.getElementById('status-dot-uptime');
                    if (dotUptime) dotUptime.textContent = data.running ? (data.uptime || '') : '';
                })
                .catch(err => console.error('Failed to fetch status:', err));
        }

        function controlService(action) {
            requireAuth(() => _doControlService(action));
        }

        function _doControlService(action) {
            setNavBusy(true);
            fetch(`/api/${action}`, { method: 'POST', credentials: 'include' })
                .then(res => res.json())
                .then(data => {
                    setTimeout(() => { updateControlStatus(); setNavBusy(false); }, 1500);
                })
                .catch(err => { console.error('Service control failed:', err); setNavBusy(false); });
        }

        function proceedWithServer(selectedPort, selectedActive) {
            port = selectedPort;
            webviewerActive = selectedActive;
            sessionStorage.setItem('webviewer_port', String(selectedPort));
            initViewerSelect();
            if (!webviewerActive) {
                loadingDiv.classList.add('hidden');
                showWebviewerDisabled();
            } else {
                checkServiceStatus();
            }
        }

        function showServerPicker() {
            loadingDiv.classList.add('hidden');
            const hubContainer = document.getElementById('hub-container');
            const pickerDiv = document.createElement('div');
            pickerDiv.className = 'flex items-center justify-center h-full bg-slate-50 absolute inset-0 p-6';
            const inner = document.createElement('div');
            inner.className = 'max-w-sm w-full';
            inner.innerHTML = `
                <h3 class="text-lg font-semibold text-slate-800 mb-1">Multiple Webviewers</h3>
                <p class="text-sm text-slate-500 mb-4">Select which webviewer to open:</p>
                <div class="space-y-2" id="server-picker-list"></div>
            `;
            pickerDiv.appendChild(inner);
            hubContainer.insertBefore(pickerDiv, hubContainer.firstChild);

            const list = document.getElementById('server-picker-list');
            allServers.forEach((srv) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'w-full flex items-center justify-between px-4 py-3 bg-white border border-slate-200 rounded-xl hover:border-slate-400 hover:shadow-sm transition text-left';
                btn.innerHTML = `
                    <span class="font-medium text-slate-800">Port ${srv.port}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full ${srv.active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}">
                        ${srv.active ? 'Enabled' : 'Disabled'}
                    </span>
                `;
                btn.addEventListener('click', () => {
                    sessionStorage.setItem('webviewer_port', srv.port);
                    pickerDiv.remove();
                    loadingDiv.classList.remove('hidden');
                    proceedWithServer(srv.port, srv.active);
                });
                list.appendChild(btn);
            });
        }

        // Initialize
        if (!hasServer || !port) {
            showError(
                'Webviewer Not Configured',
                'No webviewer server has been configured. Please add a server configuration in the Webviewer settings.'
            );
        } else if (requestedPort) {
            proceedWithServer(port, webviewerActive);
        } else if (allServers.length > 1) {
            const savedPort = sessionStorage.getItem('webviewer_port');
            const saved = savedPort && allServers.find(s => String(s.port) === String(savedPort));
            if (saved) {
                proceedWithServer(saved.port, saved.active);
            } else {
                showServerPicker();
            }
        } else {
            proceedWithServer(port, webviewerActive);
        }
    </script>
</body>
</html>
